<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账本</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <header>
    <h1>📒 记账本</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="records">📋 记账</button>
      <button class="tab" data-tab="stats">📊 统计</button>
      <button class="tab" data-tab="categories">🏷️ 分类</button>
    </nav>
  </header>

  <section id="tab-records" class="tab-content active">
    <div class="filter-bar">
      <label>年份 <select id="filter-year"></select></label>
      <label>月份 <select id="filter-month"></select></label>
      <button id="btn-add" class="btn primary">+ 新增记录</button>
    </div>
    <div class="stats-cards" id="month-stats">
      <div class="card income"><span class="label">收入</span><span class="value" id="stat-income">¥0</span></div>
      <div class="card expense"><span class="label">支出</span><span class="value" id="stat-expense">¥0</span></div>
      <div class="card balance"><span class="label">结余</span><span class="value" id="stat-balance">¥0</span></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>日期</th><th>类型</th><th>分类</th><th>金额</th><th>备注</th><th>状态</th><th>操作</th>
        </tr></thead>
        <tbody id="records-body"></tbody>
      </table>
    </div>
    <p class="empty-msg" id="empty-msg">暂无记录，点击上方「+ 新增记录」开始记账</p>
  </section>

  <section id="tab-stats" class="tab-content">
    <div class="filter-bar">
      <label>年份 <select id="stats-year"></select></label>
      <label>月份 <select id="stats-month"></select></label>
    </div>
    <div class="stats-cards">
      <div class="card income"><span class="label">收入</span><span class="value" id="stats-income">¥0</span></div>
      <div class="card expense"><span class="label">支出</span><span class="value" id="stats-expense">¥0</span></div>
      <div class="card balance"><span class="label">结余</span><span class="value" id="stats-balance">¥0</span></div>
    </div>
    <h3>支出柱状图</h3>
    <div class="chart-controls">
      <button class="btn chart-btn active" data-days="7">近7天</button>
      <button class="btn chart-btn" data-days="15">近15天</button>
      <button class="btn chart-btn" data-days="30">近30天</button>
    </div>
    <div class="chart-container">
      <canvas id="expense-chart" height="250"></canvas>
    </div>
  </section>

  <section id="tab-categories" class="tab-content">
    <div class="filter-bar">
      <button id="btn-add-cat" class="btn primary">+ 新增分类</button>
    </div>
    <div id="category-list"></div>
  </section>
</div>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="modal-title">新增记录</h2>
    <form id="modal-form">
      <input type="hidden" id="form-id">
      <label>日期 <input type="date" id="form-date" required></label>
      <label>类型 <select id="form-type"><option value="expense">支出</option><option value="income">收入</option></select></label>
      <label>分类 <select id="form-category" required></select></label>
      <label>金额 <input type="number" id="form-amount" step="0.01" min="0" placeholder="0.00" required></label>
      <label>状态 <select id="form-status"><option value="pending">未完成</option><option value="done">已完成</option></select></label>
      <label>备注 <textarea id="form-note" rows="2"></textarea></label>
      <div class="modal-actions">
        <button type="button" class="btn" id="modal-cancel">取消</button>
        <button type="submit" class="btn primary" id="modal-save">保存</button>
      </div>
    </form>
  </div>
</div>

<div id="cat-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2 id="cat-modal-title">新增分类</h2>
    <form id="cat-modal-form">
      <input type="hidden" id="cat-form-id">
      <label>名称 <input type="text" id="cat-form-name" required maxlength="20"></label>
      <label>类型 <select id="cat-form-type"><option value="expense">支出</option><option value="income">收入</option></select></label>
      <div class="modal-actions">
        <button type="button" class="btn" id="cat-modal-cancel">取消</button>
        <button type="submit" class="btn primary">保存</button>
      </div>
    </form>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
